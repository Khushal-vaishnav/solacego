apiVersion: v1
kind: Service
metadata:
  name: solacedc
  namespace: solace
spec:
  type: NodePort
  selector:
    app: solacedc
  ports:
  - name: smf
    port: 55555
    targetPort: 55555
    nodePort: 30555
  - name: web
    port: 8080
    targetPort: 8080
    nodePort: 30080
  - name: ssh
    port: 2222
    targetPort: 2222
    nodePort: 32222
  - name: ssl
    port: 1943
    targetPort: 1943
    nodePort: 31943
